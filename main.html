<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<form method="post">

		<label for="name">Name</label>
		<input type="text" id="name" name="name" placeholder="Enter name" required>

		<label for="email">Email</label>
		<input type="email" id="email" name="email" placeholder="Enter email" required>

		<label for="gender_m">Gender</label>
		<input type="radio" id="gender_m" name="gender" value="MALE" required> Male
		<input type="radio" id="gender_f" name="gender" value="FEMALE"> Female

		<label for="laptop">Laptop Brands</label>
		<select id="laptop" name="laptop">
			<option value="Apple">Apple</option>
			<option value="Asus">Asus</option>
			<option value="HP">HP</option>
		</select>

		<label for="age">Age</label>
		<input type="number" id="age" name="age" placeholder="Enter age" required>

		<label for="dob">Date of Birth</label>
		<input type="date" id="dob" name="dob" required>

		<label for="password">Password </label>
		<input type="password" id="password" name="password" placeholder="Enter Password" required>

		<label for="portfolio">Portfolio URL</label>
		<input type="url" id="portfolio" name="portfolio">

		<button type="submit">Submit</button>
		
	</form>
	<!-- the entire body must be written by student -->
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
